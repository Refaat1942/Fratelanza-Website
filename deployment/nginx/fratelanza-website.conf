# Fratelanza Corporate Website — www.fratelanza.com
# Proxies to isolated Docker container on port 11000.
# Does NOT modify any existing nginx site files.
#
# Install:
#   sudo cp deployment/nginx/fratelanza-website.conf /etc/nginx/sites-available/fratelanza-corporate
#   sudo ln -sf /etc/nginx/sites-available/fratelanza-corporate /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d www.fratelanza.com
#
# Or run: ./deployment/scripts/setup-domain.sh

# Redirect bare domain to www (enable ONLY after disabling the old /etc/nginx/sites-enabled/fratelanza site)
# server {
#     listen 80;
#     listen [::]:80;
#     server_name fratelanza.com;
#     return 301 https://www.fratelanza.com$request_uri;
# }

server {
    listen 80;
    listen [::]:80;
    server_name www.fratelanza.com;

    client_max_body_size 10M;

    location /api/health {
        proxy_pass http://127.0.0.1:11000/api/health;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:11000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_connect_timeout 60s;
    }
}

# Certbot will add the HTTPS server block automatically after:
#   sudo certbot --nginx -d www.fratelanza.com
