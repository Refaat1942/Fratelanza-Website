# Fratelanza Corporate Website — www.fratelanza.com
# Proxies to isolated Docker container on port 11000.
# Does NOT modify any existing nginx site files.

server {
    listen 80;
    listen [::]:80;
    server_name www.fratelanza.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.fratelanza.com;

    ssl_certificate /etc/letsencrypt/live/www.fratelanza.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.fratelanza.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location /api/health {
        proxy_pass http://127.0.0.1:11000/api/health;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:11000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_connect_timeout 60s;
    }
}

