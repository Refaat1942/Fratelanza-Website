# NEW Nginx site config for Fratelanza Corporate Website
# Option B: New subdomain — does NOT modify any existing nginx configs.
#
# Installation:
#   sudo cp deployment/nginx/fratelanza-website.conf /etc/nginx/sites-available/fratelanza-corporate
#   sudo ln -s /etc/nginx/sites-available/fratelanza-corporate /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d www.fratelanza.com

server {
    listen 80;
    listen [::]:80;
    server_name www.fratelanza.com;

    location / {
        proxy_pass http://127.0.0.1:11000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
    }

    location /api/health {
        proxy_pass http://127.0.0.1:11000/api/health;
        access_log off;
    }
}

